# =============================================================================
# Alacritty — macOS Terminal.app inspired config
# =============================================================================

[general]
live_config_reload = true

# ── Window ───────────────────────────────────────────────────────────────────
[window]
opacity          = 0.94           # slight transparency like Terminal.app
blur             = true
decorations      = "None"         # remove title bar (pure content)
startup_mode     = "Windowed"
dynamic_title    = true
padding          = { x = 18, y = 14 }
dynamic_padding  = false

[window.dimensions]
columns = 120
lines   = 34

# ── Scrolling ─────────────────────────────────────────────────────────────────
[scrolling]
history    = 10000
multiplier = 3

# ── Font ─────────────────────────────────────────────────────────────────────
[font]
size = 13.5

[font.normal]
family = "JetBrainsMono Nerd Font"   # change to "SF Mono" if you install it
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style  = "Bold Italic"

# ── Catppuccin Mocha (closest to macOS dark terminal palette) ─────────────────
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.cursor]
text   = "#1e1e2e"
cursor = "#f5e0dc"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#89dceb"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#89dceb"
white   = "#a6adc8"

# ── Cursor ────────────────────────────────────────────────────────────────────
[cursor]
style           = { shape = "Block", blinking = "On" }
blink_interval  = 750
unfocused_hollow = true

# ── Selection ────────────────────────────────────────────────────────────────
[selection]
save_to_clipboard = true

# ── Keyboard ─────────────────────────────────────────────────────────────────
# macOS-style bindings (remapped to Linux equivalents)
[[keyboard.bindings]]
key   = "V"
mods  = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key   = "C"
mods  = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key   = "Return"
mods  = "Control|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key   = "Plus"
mods  = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key   = "Minus"
mods  = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key   = "Key0"
mods  = "Control"
action = "ResetFontSize"
