# =============================================================================
# tmux.conf — macOS-inspired config
# =============================================================================

# ── Prefix: Ctrl-a (easier than Ctrl-b) ──────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── True color + italics ──────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-shell /usr/bin/zsh

# ── Mouse support ─────────────────────────────────────────────────────────────
set -g mouse on

# ── Start windows/panes at 1 (macOS-like, matches keyboard) ──────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Splits: | and - (intuitive) ───────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── New window in same path ───────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ── Vim-like pane navigation ──────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize panes ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── No delay for Escape key ───────────────────────────────────────────────────
set -s escape-time 0
set -g repeat-time 300

# ── Status bar — macOS menubar-inspired ───────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80

# Left: session name
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#313244] │ "

# Right: cpu-ish, date, time
set -g status-right "#[fg=#6c7086] %a %d %b  #[fg=#cba6f7]%H:%M "

# Window tabs
setw -g window-status-format         " #I #W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I #W "
setw -g window-status-style          "fg=#6c7086"
setw -g window-status-current-style  "fg=#1e1e2e,bg=#89b4fa"

# ── Pane border ───────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ── TPM plugin manager (optional) ────────────────────────────────────────────
# Install with: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I to install
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# run '~/.tmux/plugins/tpm/tpm'
