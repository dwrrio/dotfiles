# =============================================================================
# neofetch config — macOS-style output
# =============================================================================

print_info() {
    info title
    info underline

    info "OS"        distro
    info "Host"      model
    info "Kernel"    kernel
    info "Uptime"    uptime
    info "Packages"  packages
    info "Shell"     shell
    info "Terminal"  term
    info "CPU"       cpu
    info "GPU"       gpu
    info "Memory"    memory
    info "Disk"      disk
    info "WM"        wm
    info "Theme"     theme
    info "Icons"     icons
    info "Font"      font
    info cols
}

# ── ASCII art: Apple logo in terminal colors ───────────────────────────────────
ascii_distro="auto"
# Use the Apple logo regardless of distro
ascii_colors=(2 3 1 1 5 4)   # green yellow red red purple blue (Apple logo colors)
ascii_bold="on"

# ── Title ─────────────────────────────────────────────────────────────────────
title_fqdn="off"

# ── OS ────────────────────────────────────────────────────────────────────────
distro_shorthand="off"
os_arch="off"

# ── Kernel ────────────────────────────────────────────────────────────────────
kernel_shorthand="on"

# ── Uptime ────────────────────────────────────────────────────────────────────
uptime_shorthand="tiny"

# ── Packages ─────────────────────────────────────────────────────────────────
package_managers="on"

# ── Shell ─────────────────────────────────────────────────────────────────────
shell_path="off"
shell_version="on"

# ── CPU ───────────────────────────────────────────────────────────────────────
cpu_brand="off"         # hide "Intel" prefix — cleaner like macOS About This Mac
cpu_speed="on"
cpu_cores="logical"
cpu_temp="C"

# ── GPU ───────────────────────────────────────────────────────────────────────
gpu_brand="off"

# ── Memory ────────────────────────────────────────────────────────────────────
memory_percent="on"
memory_unit="mib"

# ── Disk ─────────────────────────────────────────────────────────────────────
disk_show=('/')
disk_subtitle="dir"

# ── Colors ────────────────────────────────────────────────────────────────────
colors=(4 6 3 5 2 1)         # blue cyan yellow magenta green red
bold="on"
underline_enabled="on"
underline_char="─"
separator=" →"

# ── Color blocks ─────────────────────────────────────────────────────────────
block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"

# ── Bar style ─────────────────────────────────────────────────────────────────
bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

# ── Image ─────────────────────────────────────────────────────────────────────
image_backend="ascii"
image_source="auto"
ascii_colors=(2 3 1 1 5 4)
image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="auto"
gap=3
yoffset=0
xoffset=0
background_color=
