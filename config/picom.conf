# =============================================================================
# picom.conf — subtle macOS-like compositor effects
# =============================================================================

# ── Backend ───────────────────────────────────────────────────────────────────
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true;

# ── Shadows ───────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 18;
shadow-offset-x = -12;
shadow-offset-y = -8;
shadow-opacity = 0.5;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Fade (smooth like macOS) ──────────────────────────────────────────────────
fading = true;
fade-in-step  = 0.05;
fade-out-step = 0.05;
fade-delta    = 5;
fade-exclude  = [];

# ── Transparency ─────────────────────────────────────────────────────────────
active-opacity   = 1.0;
inactive-opacity = 0.92;
frame-opacity    = 1.0;
inactive-opacity-override = false;

# App-specific: keep terminals slightly transparent
opacity-rule = [
    "94:class_g = 'Alacritty'",
    "95:class_g = 'xterm'",
    "100:class_g = 'Firefox'"
];

# ── Blur (frosted glass — like macOS) ────────────────────────────────────────
blur-method  = "dual_kawase";
blur-strength = 7;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-kern = "3x3box";
blur-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Corners (rounded like macOS) ─────────────────────────────────────────────
corner-radius = 10;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ── Other ─────────────────────────────────────────────────────────────────────
mark-wmwin-focused   = true;
mark-ovredir-focused = true;
use-ewmh-active-win  = true;
detect-rounded-corners = true;
detect-client-opacity  = true;
detect-transient       = true;
detect-client-leader   = true;
log-level = "warn";
